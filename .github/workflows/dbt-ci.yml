name: dbt CI

on:
  pull_request:
    branches: [main]

env:
  DBT_PROFILES_DIR: ./

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install dbt-duckdb sqlfluff

      - name: "Gate 1 -- Lint SQL"
        run: sqlfluff lint models/ tests/ --dialect postgres

      - name: "Gate 2 -- Build models"
        run: |
          dbt deps
          dbt seed
          dbt run

      - name: "Gate 3 -- Run tests"
        run: dbt test

  # --------------------------------------------------------------------------
  # Gate 4 -- Source Freshness
  # --------------------------------------------------------------------------
  # This gate does NOT run on pull requests. Source freshness validates the
  # state of data in the warehouse, not the quality of code changes.
  # It belongs in the orchestration layer (Airflow, dbt Cloud, cron) and runs
  # on a schedule before production builds:
  #
  #   dbt source freshness
  #
  # If the most recent loaded_at timestamp in a source table is older than
  # the configured threshold, the pipeline stops before building models
  # on stale data. See models/sources.yml for threshold configuration.
